[dependency-groups]
dev = [
    "prek>=0.4.5",
]
dns = [
    "octodns>=1.19.0",
    "octodns-cloudflare>=1.2.0",
]

[tool.uv]
# Sync with Dependabot's uv version
required-version = ">=0.11.8"
exclude-newer = "P7D"
environments = [
    "sys_platform == 'linux' and platform_machine == 'x86_64'",
]

