---
name: Generate DNS change plan
on:
  pull_request:
permissions:
  contents: read
jobs:
  octodns-sync:
    name: Run `octodns-sync` with production.yaml
    runs-on: ubuntu-latest
    outputs:
      plan: ${{ steps.generate-plan.outputs.plan }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false
      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
          activate-environment: true
      - name: Install dependencies
        run: uv sync --frozen --only-group dns
      - name: Generate plan
        id: generate-plan
        env:
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_RO_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
        run: |-
          # octodns writes the rendered PlanMarkdown to stdout and its own logs
          # to stderr. Capture stdout as the plan, then echo it so the plan is
          # also visible in the job log for troubleshooting.
          plan="$(uv run octodns-sync --config-file=dns/production.yaml --force)"
          echo "$plan"
          {
            echo "plan<<OCTODNS_PLAN_EOF"
            echo "$plan"
            echo "OCTODNS_PLAN_EOF"
          } >> "$GITHUB_OUTPUT"
  add-pr-comment:
    name: Add `octodns-sync` plan to comment
    if: ${{ ! contains(needs.octodns-sync.outputs.plan, 'No changes were planned') }}
    needs: [octodns-sync]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Create or update comment
        env:
          GH_TOKEN: ${{ github.token }}
          PLAN: ${{ needs.octodns-sync.outputs.plan }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |-
          gh pr comment "$PR_NUMBER" \
            --repo "$REPO" \
            --edit-last \
            --create-if-none \
            --body-file - <<EOF
          # OctoDNS Plan for \`$HEAD_REF\`
          $PLAN
          EOF
